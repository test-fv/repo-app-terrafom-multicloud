name: Enterprise MultiCloud Deployment

on:

  workflow_dispatch:

    inputs:

      cloud-provider:

        description: Cloud Provider

        required: true

        type: choice

        options:

          - aws

          - azure

############################################################
# Pipeline
############################################################

jobs:

  ############################################################
  # Terraform Plan
  ############################################################

  terraform-plan:

    uses: ./.github/workflows/terraform-plan.yml

    with:

      cloud-provider: ${{ inputs.cloud-provider }}

    secrets: inherit

  ############################################################
  # Terraform Apply
  ############################################################

  terraform-apply:

    needs: terraform-plan

    uses: ./.github/workflows/terraform-apply.yml

    with:

      cloud-provider: ${{ inputs.cloud-provider }}

    secrets: inherit

  ############################################################
  # Publish Runtime
  ############################################################

  publish-runtime:

    needs: terraform-apply

    uses: ./.github/workflows/publish-runtime.yml

    with:

      cloud-provider: ${{ inputs.cloud-provider }}

    secrets: inherit

  ############################################################
  # Build Image
  ############################################################

  build-image:

    needs: terraform-apply

    uses: ./.github/workflows/build-image.yml

    with:

      cloud-provider: ${{ inputs.cloud-provider }}

    secrets: inherit

  ############################################################
  # Deploy
  ############################################################

  deploy:

    needs:

      - terraform-apply
      - publish-runtime
      - build-image

    uses: ./.github/workflows/deploy-ssm.yml

    with:

      cloud-provider: ${{ inputs.cloud-provider }}

      image-tag: ${{ needs.build-image.outputs.image-tag }}

    secrets: inherit