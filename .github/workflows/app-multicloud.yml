name: Multi Cloud Application Delivery

on:
  workflow_dispatch:
    inputs:
      cloud:
        required: true
        type: choice
        options:
          - aws
          - azure

concurrency:
  group: app-${{ github.event.inputs.cloud }}
  cancel-in-progress: false

jobs:

  terraform:
    uses: ./.github/workflows/read-outputs.yml
    with:
      cloud-provider: ${{ github.event.inputs.cloud }}
      working-directory: terraform/environments/${{ github.event.inputs.cloud }}/prod
    secrets: inherit

  build:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Download Terraform Outputs Artifact
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs-${{ github.event.inputs.cloud }}

      - name: Parse Terraform Outputs
        id: tf
        shell: bash
        run: |
          set -euo pipefail

          VM_IP=$(jq -r '.vm_ip.value' outputs.json)
          REGISTRY_SERVER=$(jq -r '.registry_server.value' outputs.json)
          REPOSITORY_NAME=$(jq -r '.repository_name.value' outputs.json)
          REGISTRY_USERNAME=$(jq -r '.registry_username.value' outputs.json)
          REGISTRY_PASSWORD=$(jq -r '.registry_password.value' outputs.json)

          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "registry_server=$REGISTRY_SERVER" >> $GITHUB_OUTPUT
          echo "repository_name=$REPOSITORY_NAME" >> $GITHUB_OUTPUT
          echo "registry_username=$REGISTRY_USERNAME" >> $GITHUB_OUTPUT
          echo "registry_password=$REGISTRY_PASSWORD" >> $GITHUB_OUTPUT

      - name: Debug Outputs
        run: |
          echo "VM_IP=${{ steps.tf.outputs.vm_ip }}"
          echo "REGISTRY=${{ steps.tf.outputs.registry_server }}"

      - name: Build Docker Image
        run: |
          IMAGE="${{ steps.tf.outputs.registry_server }}/${{ steps.tf.outputs.repository_name }}"

          docker build -t $IMAGE:latest ./app

      - name: Login to Registry
        run: |
          echo "${{ steps.tf.outputs.registry_password }}" | docker login \
            --username "${{ steps.tf.outputs.registry_username }}" \
            --password-stdin \
            "${{ steps.tf.outputs.registry_server }}"

      - name: Push Image
        run: |
          IMAGE="${{ steps.tf.outputs.registry_server }}/${{ steps.tf.outputs.repository_name }}"
          docker push $IMAGE:latest


  deploy:
    needs: [terraform, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download Terraform Outputs Artifact
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs-${{ github.event.inputs.cloud }}

      - name: Show Deployment Context
        run: |
          echo "VM: $(jq -r '.vm_ip.value' outputs.json)"
          echo "REGISTRY: $(jq -r '.registry_server.value' outputs.json)"