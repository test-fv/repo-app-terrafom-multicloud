name: Reusable Terraform Plan

on:
  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

jobs:

  plan:

    runs-on: ubuntu-latest

    env:
      TF_VAR_instance_type: ${{ vars.TF_VAR_INSTANCE_TYPE }}
      TF_VAR_repository_name: ${{ vars.TF_VAR_REPOSITORY_NAME }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_AWS_REGION }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow Version
        run: |
          echo "############################################"
          echo "TERRAFORM PLAN WORKFLOW VERSION 2026-06-09"
          echo "############################################"

      - name: Debug Working Directory
        run: |
          echo "===== PWD ====="
          pwd

          echo "===== FILES ====="
          ls -la

      - name: Debug TF Vars
        run: |
          echo "=================================="
          echo "TF_VAR_instance_type=[$TF_VAR_instance_type]"
          echo "TF_VAR_repository_name=[$TF_VAR_repository_name]"
          echo "TF_VAR_aws_region=[$TF_VAR_aws_region]"
          echo "=================================="

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -reconfigure -input=false

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -no-color