name: Terraform Apply

on:
  workflow_call:
    inputs:
      cloud-provider:
        required: true
        type: string
      working-directory:
        required: true
        type: string

jobs:

  apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # CONFIGURE AWS (SI APLICA)
      # =========================
      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================
      # TERRAFORM SETUP
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -reconfigure -input=false

      # =========================
      # 🔥 DEBUG REAL (STATE INSPECTION)
      # =========================
      - name: DEBUG STATE LIST
        run: terraform state list || true

      - name: DEBUG TLS PRIVATE KEY CHECK
        run: terraform state list | grep tls_private_key || true

      - name: DEBUG TERRAFORM OUTPUT RAW
        run: |
          echo "=============================="
          echo "TERRAFORM OUTPUT (RAW)"
          echo "=============================="
          terraform output || true

          echo "=============================="
          echo "TERRAFORM OUTPUT (JSON)"
          echo "=============================="
          terraform output -json || true

      # =========================
      # APPLY
      # =========================
      - name: Terraform Apply
        run: terraform apply -auto-approve