name: Terraform Apply

on:

  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

jobs:

  apply:

    runs-on: ubuntu-latest

    env:

      TF_WORKING_DIR: ${{ inputs.cloud-provider == 'aws' && 'terraform/stacks/aws/app-platform' || 'terraform/stacks/azure/app-platform' }}

      TF_VAR_name_prefix: ${{ vars.NAME_PREFIX }}
      TF_VAR_instance_type: ${{ vars.TF_VAR_INSTANCE_TYPE }}
      TF_VAR_repository_name: ${{ vars.TF_VAR_REPOSITORY_NAME }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_AWS_REGION }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_subnet_cidr: ${{ vars.SUBNET_CIDR }}

      TF_VAR_tags: >
        {
          "Project":"Enterprise",
          "Environment":"Production",
          "ManagedBy":"Terraform"
        }

    defaults:

      run:

        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:

      ############################################################
      # Checkout
      ############################################################

      - name: Checkout
        uses: actions/checkout@v4

      ############################################################
      # AWS
      ############################################################

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ############################################################
      # Azure
      ############################################################

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      ############################################################
      # Terraform
      ############################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        shell: bash
        run: |
          terraform init \
            -reconfigure \
            -input=false \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_BACKEND_LOCK_TABLE }}"

      ############################################################
      # Validate State
      ############################################################

      - name: Validate Terraform State
        shell: bash
        run: |
          terraform state list || true

      ############################################################
      # Validate Configuration
      ############################################################

      - name: Terraform Validate
        shell: bash
        run: terraform validate
      ############################################################
      # APPLY
      ############################################################

      - name: Terraform Apply
        shell: bash
        run: |
          set -Eeuo pipefail

          terraform apply \
            -auto-approve \
            -input=false

      ############################################################
      # EXPORT OUTPUTS
      ############################################################

      - name: Export Terraform Outputs
        shell: bash
        run: |
          set -Eeuo pipefail

          terraform output -json > outputs.json

      ############################################################
      # VERIFY OUTPUTS
      ############################################################

      - name: Verify Outputs
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "========== Terraform Outputs =========="

          cat outputs.json | jq .

          echo "======================================="

          test "$(jq -r '.instance_id.value' outputs.json)" != "null"
          test "$(jq -r '.registry_server.value' outputs.json)" != "null"
          test "$(jq -r '.repository_name.value' outputs.json)" != "null"
          test "$(jq -r '.runtime_bucket_name.value' outputs.json)" != "null"

      ############################################################
      # PUBLISH CONTRACT
      ############################################################

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v4

        with:

          name: terraform-outputs

          path: ${{ env.TF_WORKING_DIR }}/outputs.json

          retention-days: 1

      ############################################################
      # SUMMARY
      ############################################################

      - name: Deployment Summary
        shell: bash
        run: |
          echo "======================================="
          echo "Terraform Apply Completed"
          echo "======================================="
          echo "Cloud Provider : ${{ inputs.cloud-provider }}"
          echo "Working Dir    : ${{ env.TF_WORKING_DIR }}"
          echo "Artifact       : terraform-outputs"
          echo "======================================="
