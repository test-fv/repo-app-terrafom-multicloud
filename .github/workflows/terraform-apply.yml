name: Terraform Apply

on:
  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

    outputs:

      public_ip:
        value: ${{ jobs.apply.outputs.public_ip }}

      instance_id:
        value: ${{ jobs.apply.outputs.instance_id }}

      registry_url:
        value: ${{ jobs.apply.outputs.registry_url }}

      registry_server:
        value: ${{ jobs.apply.outputs.registry_server }}

      repository_name:
        value: ${{ jobs.apply.outputs.repository_name }}

      runtime_bucket_name:
        value: ${{ jobs.apply.outputs.runtime_bucket_name }}

      runtime_bucket_arn:
        value: ${{ jobs.apply.outputs.runtime_bucket_arn }}

jobs:

  apply:

    runs-on: ubuntu-latest

    env:

      TF_WORKING_DIR: ${{ inputs.cloud-provider == 'aws' && 'terraform/stacks/aws/app-platform' || 'terraform/stacks/azure/app-platform' }}

      TF_VAR_name_prefix: ${{ vars.NAME_PREFIX }}
      TF_VAR_instance_type: ${{ vars.TF_VAR_INSTANCE_TYPE }}
      TF_VAR_repository_name: ${{ vars.TF_VAR_REPOSITORY_NAME }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_AWS_REGION }}

      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_subnet_cidr: ${{ vars.SUBNET_CIDR }}

      TF_VAR_tags: >
        {
          "Project":"Enterprise",
          "Environment":"Production",
          "ManagedBy":"Terraform"
        }

    outputs:

      public_ip: ${{ steps.tf.outputs.public_ip }}
      instance_id: ${{ steps.tf.outputs.instance_id }}
      registry_url: ${{ steps.tf.outputs.registry_url }}
      registry_server: ${{ steps.tf.outputs.registry_server }}
      repository_name: ${{ steps.tf.outputs.repository_name }}
      runtime_bucket_name: ${{ steps.tf.outputs.runtime_bucket_name }}
      runtime_bucket_arn: ${{ steps.tf.outputs.runtime_bucket_arn }}

    defaults:

      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:

      - uses: actions/checkout@v4

      ############################################################
      # AWS
      ############################################################

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ############################################################
      # Azure
      ############################################################

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      ############################################################
      # Terraform
      ############################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        run: |
          terraform init \
            -reconfigure \
            -input=false \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_BACKEND_LOCK_TABLE }}"

      - name: Download State
        run: terraform state pull > state.json

      - name: Print Resources
        run: |
          cat state.json | jq '.resources[].type'

      ############################################################
      # DEBUG
      ############################################################

      - name: Show Remote State
        run: terraform state pull

      - name: Show Existing AWS Resources
        if: inputs.cloud-provider == 'aws'
        shell: bash
        run: |
          echo "========== VPCS =========="
          aws ec2 describe-vpcs --output json

          echo "========== EC2 =========="
          aws ec2 describe-instances --output json

          echo "========== ECR =========="
          aws ecr describe-repositories --output json

          echo "========== IAM ROLES =========="
          aws iam list-roles --output json

          echo "========== S3 =========="
          aws s3api list-buckets --output json

      ############################################################
      # APPLY
      ############################################################

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      ############################################################
      # DEBUG OUTPUTS
      ############################################################

      - name: Debug Terraform Outputs
        shell: bash
        run: |
          terraform output
          echo "----------------------------"
          terraform output -json

      ############################################################
      # CAPTURE OUTPUTS
      ############################################################

      - name: Capture Terraform Outputs
        id: tf
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "registry_url=$(terraform output -raw registry_url)" >> $GITHUB_OUTPUT
          echo "registry_server=$(terraform output -raw registry_server)" >> $GITHUB_OUTPUT
          echo "repository_name=$(terraform output -raw repository_name)" >> $GITHUB_OUTPUT
          echo "runtime_bucket_name=$(terraform output -raw runtime_bucket_name)" >> $GITHUB_OUTPUT
          echo "runtime_bucket_arn=$(terraform output -raw runtime_bucket_arn)" >> $GITHUB_OUTPUT

      ############################################################
      # DEBUG GITHUB OUTPUTS
      ############################################################

      - name: Debug GitHub Outputs
        shell: bash
        run: |
          echo "runtime_bucket_name = '${{ steps.tf.outputs.runtime_bucket_name }}'"
          echo "runtime_bucket_arn  = '${{ steps.tf.outputs.runtime_bucket_arn }}'"
          echo "registry_server     = '${{ steps.tf.outputs.registry_server }}'"


      - name: Verify Step Outputs
        if: always()
        run: |
          echo "PUBLIC_IP=${{ steps.tf.outputs.public_ip }}"
          echo "INSTANCE_ID=${{ steps.tf.outputs.instance_id }}"
          echo "BUCKET=${{ steps.tf.outputs.runtime_bucket_name }}"
          echo "REGISTRY=${{ steps.tf.outputs.registry_server }}"          