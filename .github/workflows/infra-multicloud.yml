name: Terraform Infrastructure

on:
  workflow_dispatch:

    inputs:

      cloud:
        required: true
        type: choice
        options:
          - azure
          - aws

      environment:
        required: true
        type: choice
        options:
          - dev
          - prod

      force_unlock:
        required: false
        type: boolean
        default: false

concurrency:
  group: terraform-${{ github.event.inputs.cloud }}-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:

  ############################################################
  # Terraform Plan
  ############################################################

  plan:

    uses: ./.github/workflows/terraform-plan.yml

    with:
      cloud-provider: ${{ github.event.inputs.cloud }}

    secrets: inherit

  ############################################################
  # Terraform Apply
  ############################################################

  apply:

    needs: plan

    uses: ./.github/workflows/terraform-apply.yml

    with:
      cloud-provider: ${{ github.event.inputs.cloud }}

    secrets: inherit