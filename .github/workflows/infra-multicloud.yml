name: Terraform Infrastructure

on:
  workflow_dispatch:

    inputs:

      cloud:
        required: true
        type: choice
        options:
          - azure
          - aws

      environment:
        required: true
        type: choice
        options:
          - dev
          - prod

      force_unlock:
        required: false
        type: boolean
        default: false

concurrency:
  group: terraform-${{ github.event.inputs.cloud }}-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:

  plan:

    uses: ./.github/workflows/terraform-plan.yml

    with:
      cloud-provider: ${{ github.event.inputs.cloud }}
      working-directory: terraform/environments/${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }}

    secrets: inherit

  apply:

    needs: plan

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        if: github.event.inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/environments/${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }}
        run: terraform init -reconfigure -input=false

      # ======================================
      # DEBUG DE ARCHIVOS
      # ======================================
      - name: Debug Terraform Files
        working-directory: terraform/environments/${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }}
        run: |
          echo "=============================="
          echo "PWD"
          echo "=============================="
          pwd

          echo "=============================="
          echo "FILES"
          echo "=============================="
          ls -la

          echo "=============================="
          echo "locals.tf"
          echo "=============================="
          cat locals.tf || true

          echo "=============================="
          echo "providers.tf"
          echo "=============================="
          cat providers.tf || true

          echo "=============================="
          echo "variables.tf"
          echo "=============================="
          cat variables.tf || true

          echo "=============================="
          echo "main.tf"
          echo "=============================="
          cat main.tf || true

      # ======================================
      # AUTO UNLOCK (OPCIONAL)
      # ======================================
      - name: Force Unlock State (optional)
        if: ${{ github.event.inputs.force_unlock == true }}
        working-directory: terraform/environments/${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }}
        run: |
          terraform force-unlock -force cfe8ea1c-f38b-800a-c34f-757040819a56 || true

      # ======================================
      # PLAN DE DEBUG
      # ======================================
      - name: Terraform Plan Debug
        working-directory: terraform/environments/${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }}
        run: |
          terraform plan -input=false -no-color

      # ======================================
      # OUTPUTS
      # ======================================
      - name: Terraform Outputs
        working-directory: terraform/environments/${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }}
        run: |
          terraform output || true
          terraform output -json || true

      # ======================================
      # APPLY
      # ======================================
      - name: Terraform Apply
        working-directory: terraform/environments/${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }}
        run: |
          terraform apply \
            -auto-approve \
            -input=false