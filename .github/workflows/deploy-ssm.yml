name: Reusable Deploy SSM

on:

  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

      image-tag:
        required: false
        default: latest
        type: string

    secrets:

      AWS_ACCESS_KEY_ID:
        required: false

      AWS_SECRET_ACCESS_KEY:
        required: false

      AWS_REGION:
        required: false

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      ############################################################
      # Checkout
      ############################################################

      - name: Checkout
        uses: actions/checkout@v4

      ############################################################
      # Download Terraform Outputs
      ############################################################

      - name: Download Terraform Outputs
        uses: actions/download-artifact@v4

        with:
          name: terraform-outputs

      ############################################################
      # Read Terraform Outputs
      ############################################################

      - name: Read Terraform Outputs

        id: tf

        shell: bash

        run: |

          set -Eeuo pipefail

          echo "instance_id=$(jq -r '.instance_id.value' outputs.json)" >> "$GITHUB_OUTPUT"

          echo "runtime_bucket=$(jq -r '.runtime_bucket_name.value' outputs.json)" >> "$GITHUB_OUTPUT"

          echo "registry_server=$(jq -r '.registry_server.value' outputs.json)" >> "$GITHUB_OUTPUT"

          echo "repository_name=$(jq -r '.repository_name.value' outputs.json)" >> "$GITHUB_OUTPUT"

      ############################################################
      # AWS Credentials
      ############################################################

      - name: Configure AWS Credentials

        if: inputs.cloud-provider == 'aws'

        uses: aws-actions/configure-aws-credentials@v4

        with:

          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: ${{ secrets.AWS_REGION }}

          
      ############################################################
      # Execute Bootstrap Through SSM
      ############################################################

      - name: Execute Bootstrap Through SSM

        shell: bash

        run: |

          set -Eeuo pipefail

          cat > ssm-commands.json <<EOF
          {
            "commands": [

              "aws s3 cp s3://${{ steps.tf.outputs.runtime_bucket }}/bootstrap/latest.sh /tmp/bootstrap.sh",

              "chmod +x /tmp/bootstrap.sh",

              "cat >/tmp/runtime.env <<'ENV'",

              "RUNTIME_BUCKET=${{ steps.tf.outputs.runtime_bucket }}",
              "CLOUD_PROVIDER=${{ inputs.cloud-provider }}",
              "AWS_REGION=${{ secrets.AWS_REGION }}",
              "REGISTRY_SERVER=${{ steps.tf.outputs.registry_server }}",
              "REPOSITORY_NAME=${{ steps.tf.outputs.repository_name }}",
              "IMAGE_TAG=${{ inputs.image-tag }}",

              "ENV",

              "bash /tmp/bootstrap.sh"

            ]
          }
          EOF

          COMMAND_ID=$(
            aws ssm send-command \
              --instance-ids "${{ steps.tf.outputs.instance_id }}" \
              --document-name "AWS-RunShellScript" \
              --comment "Enterprise Deployment" \
              --parameters file://ssm-commands.json \
              --query "Command.CommandId" \
              --output text
          )

          echo "======================================"
          echo "Command ID: ${COMMAND_ID}"
          echo "======================================"

          echo "Esperando finalización del comando..."
          while true
          do

            STATUS=$(
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${{ steps.tf.outputs.instance_id }}" \
                --query Status \
                --output text
            )

            echo "Estado: ${STATUS}"

            case "$STATUS" in

              Pending|InProgress|Delayed)
                sleep 5
                ;;

              *)
                break
                ;;

            esac

          done

          echo "======================================"
          echo "Execution Result"
          echo "======================================"

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.tf.outputs.instance_id }}"

            

          echo "==============================="
          echo "STDOUT"
          echo "==============================="

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.tf.outputs.instance_id }}" \
            --query StandardOutputContent \
            --output text

          echo "==============================="
          echo "STDERR"
          echo "==============================="

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.tf.outputs.instance_id }}" \
            --query StandardErrorContent \
            --output text

          STATUS=$(
            aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ steps.tf.outputs.instance_id }}" \
              --query Status \
              --output text
          )

          echo "Deployment Status = ${STATUS}"

          if [ "${STATUS}" != "Success" ]; then
            echo "Deployment FAILED"
            exit 1
          fi  

          echo "======================================"
          echo "Waiting Health Check..."
          echo "======================================"

          sleep 20

          aws ssm send-command \
            --instance-ids "${{ steps.tf.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -fsS http://localhost:80/health"]' \
            --query Command.CommandId \
            --output text > health.txt

          HEALTH_COMMAND=$(cat health.txt)

          sleep 10

          HEALTH_STATUS=$(
            aws ssm get-command-invocation \
                --command-id "$HEALTH_COMMAND" \
                --instance-id "${{ steps.tf.outputs.instance_id }}" \
                --query Status \
                --output text
          )

          echo "Health Status = ${HEALTH_STATUS}"

          if [ "${HEALTH_STATUS}" != "Success" ]; then
              echo "Health Check FAILED"
              exit 1
          fi

          echo "Health Check OK"

            


            
      ############################################################
      # Summary
      ############################################################

      - name: Summary

        shell: bash

        run: |

          echo "======================================"
          echo "Enterprise Deployment Completed"
          echo "======================================"
          echo "Instance  : ${{ steps.tf.outputs.instance_id }}"
          echo "Bucket    : ${{ steps.tf.outputs.runtime_bucket }}"
          echo "Registry  : ${{ steps.tf.outputs.registry_server }}"
          echo "Image Tag : ${{ inputs.image-tag }}"
          echo "======================================"