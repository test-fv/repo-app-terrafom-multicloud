name: Reusable App Build

on:
  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

      registry-server:
        required: true
        type: string

      repository-name:
        required: true
        type: string

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Application
        working-directory: app
        run: mvn clean package

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug Inputs (SAFE)
        run: |
          echo "registry-server length=${#REGISTRY_SERVER}"
          echo "repository=${REPOSITORY_NAME}"
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}
          REPOSITORY_NAME: ${{ inputs.repository-name }}

      - name: FAIL FAST CHECK
        run: |
          if [ -z "${REGISTRY_SERVER}" ]; then
            echo "❌ registry-server is EMPTY (input not passed)"
            exit 1
          fi
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}

      - name: AWS ECR Login
        if: inputs.cloud-provider == 'aws'
        shell: bash
        run: |
          set -euo pipefail

          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
              --username AWS \
              --password-stdin \
              "$REGISTRY_SERVER"
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}

      - name: Docker Build
        run: |
          IMAGE="$REGISTRY_SERVER/$REPOSITORY_NAME"

          docker build \
            -t ${IMAGE}:latest \
            ./app
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}
          REPOSITORY_NAME: ${{ inputs.repository-name }}

      - name: Docker Push
        run: |
          IMAGE="$REGISTRY_SERVER/$REPOSITORY_NAME"

          docker push ${IMAGE}:latest
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}
          REPOSITORY_NAME: ${{ inputs.repository-name }}