name: Reusable App Build

on:
  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

      registry-url:
        required: true
        type: string

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # JAVA BUILD
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Application
        working-directory: app
        run: mvn clean package

      # =========================
      # AZURE LOGIN
      # =========================
      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Container Registry Login
        if: inputs.cloud-provider == 'azure'
        run: |
          set -e
          az acr login --name ${{ secrets.TF_VAR_acr_name }}

      # =========================
      # AWS CONFIG
      # =========================
      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================
      # 🔥 DEBUG CRÍTICO (TU PROBLEMA ACTUAL)
      # =========================
      - name: Debug Registry URL
        run: |
          echo "=============================="
          echo "CLOUD: ${{ inputs.cloud-provider }}"
          echo "REGISTRY RECEIVED: ${{ inputs.registry-url }}"
          echo "=============================="

      # =========================
      # VALIDACIÓN REGISTRY (EVITA DOCKER HUB FALLBACK)
      # =========================
      - name: Validate Registry URL
        run: |
          set -e

          if [ -z "${{ inputs.registry-url }}" ]; then
            echo "❌ ERROR: registry-url is empty"
            exit 1
          fi

          echo "✔ Registry OK: ${{ inputs.registry-url }}"

      # =========================
      # AWS ECR LOGIN
      # =========================
      - name: AWS ECR Login
        if: inputs.cloud-provider == 'aws'
        run: |
          set -e

          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login \
            --username AWS \
            --password-stdin \
            ${{ inputs.registry-url }}

      # =========================
      # DOCKER BUILD
      # =========================
      - name: Docker Build
        run: |
          set -e

          docker build \
            -t ${{ inputs.registry-url }}/myapp:latest \
            ./app

      # =========================
      # DOCKER PUSH
      # =========================
      - name: Docker Push
        run: |
          set -e

          docker push \
            ${{ inputs.registry-url }}/myapp:latest