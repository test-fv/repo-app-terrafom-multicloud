name: Reusable App Build

on:
  workflow_call:

    inputs:
      cloud-provider:
        required: true
        type: string

      registry-server:
        required: true
        type: string

      repository-name:
        required: true
        type: string

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        working-directory: app
        run: mvn clean package

      - name: Configure AWS
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: FAIL FAST CHECK
        shell: bash
        run: |
          if [ -z "${REGISTRY_SERVER}" ]; then
            echo "❌ registry-server EMPTY"
            exit 1
          fi
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}

      - name: ECR Login
        if: inputs.cloud-provider == 'aws'
        shell: bash
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
            --username AWS \
            --password-stdin \
            "$REGISTRY_SERVER"
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}

      - name: Build Image
        run: |
          IMAGE="$REGISTRY_SERVER/$REPOSITORY_NAME"
          docker build -t $IMAGE:latest ./app
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}
          REPOSITORY_NAME: ${{ inputs.repository-name }}

      - name: Push Image
        run: |
          IMAGE="$REGISTRY_SERVER/$REPOSITORY_NAME"
          docker push $IMAGE:latest
        env:
          REGISTRY_SERVER: ${{ inputs.registry-server }}
          REPOSITORY_NAME: ${{ inputs.repository-name }}