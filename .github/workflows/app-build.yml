name: Reusable App Build

on:
  workflow_call:

    inputs:
      cloud-provider:
        required: true
        type: string
      registry-server:
        required: true
        type: string
      repository-name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate input
        run: |
          if [ -z "${{ inputs.registry-server }}" ]; then
            echo "❌ registry-server vacío"
            exit 1
          fi

      - name: AWS Login
        if: inputs.cloud-provider == 'aws'
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
            --username AWS \
            --password-stdin \
            "${{ inputs.registry-server }}"

      - name: Build image
        run: |
          docker build \
            -t "${{ inputs.registry-server }}/${{ inputs.repository-name }}:latest" \
            ./app

      - name: Push image
        run: |
          docker push "${{ inputs.registry-server }}/${{ inputs.repository-name }}:latest"