name: Reusable Terraform Outputs

on:
  workflow_call:
    inputs:
      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

    outputs:
      vm_ip:
        value: ${{ jobs.terraform_outputs.outputs.vm_ip }}

      registry_server:
        value: ${{ jobs.terraform_outputs.outputs.registry_server }}

      repository_name:
        value: ${{ jobs.terraform_outputs.outputs.repository_name }}

      registry_username:
        value: ${{ jobs.terraform_outputs.outputs.registry_username }}

      registry_password:
        value: ${{ jobs.terraform_outputs.outputs.registry_password }}

      ssh_user:
        value: ${{ jobs.terraform_outputs.outputs.ssh_user }}

jobs:

  terraform_outputs:

    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.tf.outputs.vm_ip }}
      registry_server: ${{ steps.tf.outputs.registry_server }}
      repository_name: ${{ steps.tf.outputs.repository_name }}
      registry_username: ${{ steps.tf.outputs.registry_username }}
      registry_password: ${{ steps.tf.outputs.registry_password }}
      ssh_user: ${{ steps.tf.outputs.ssh_user }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs (ROBUST JSON MODE)
        id: tf
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |

          set -euo pipefail

          echo "=== TERRAFORM OUTPUT JSON ==="
          terraform output -json > tf.json

          cat tf.json

          VM_IP=$(jq -r '.vm_ip.value' tf.json)
          REGISTRY_SERVER=$(jq -r '.registry_server.value' tf.json)
          REPOSITORY_NAME=$(jq -r '.repository_name.value' tf.json)
          REGISTRY_USERNAME=$(jq -r '.registry_username.value' tf.json)
          REGISTRY_PASSWORD=$(jq -r '.registry_password.value' tf.json)

          echo "RAW REGISTRY SERVER: [$REGISTRY_SERVER]"

          cat <<EOF >> "$GITHUB_OUTPUT"
vm_ip=$VM_IP
registry_server=$REGISTRY_SERVER
repository_name=$REPOSITORY_NAME
registry_username=$REGISTRY_USERNAME
registry_password=$REGISTRY_PASSWORD
ssh_user=ec2-user
EOF