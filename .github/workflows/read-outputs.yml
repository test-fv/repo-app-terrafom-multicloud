name: Reusable Terraform Outputs

on:
  workflow_call:
    inputs:
      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

    outputs:
      vm_ip:
        value: ${{ jobs.terraform.outputs.vm_ip }}
      registry_server:
        value: ${{ jobs.terraform.outputs.registry_server }}
      repository_name:
        value: ${{ jobs.terraform.outputs.repository_name }}
      registry_username:
        value: ${{ jobs.terraform.outputs.registry_username }}
      registry_password:
        value: ${{ jobs.terraform.outputs.registry_password }}
      ssh_user:
        value: ${{ jobs.terraform.outputs.ssh_user }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.outputs.outputs.vm_ip }}
      registry_server: ${{ steps.outputs.outputs.registry_server }}
      repository_name: ${{ steps.outputs.outputs.repository_name }}
      registry_username: ${{ steps.outputs.outputs.registry_username }}
      registry_password: ${{ steps.outputs.outputs.registry_password }}
      ssh_user: ${{ steps.outputs.outputs.ssh_user }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs
        id: outputs
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          set -euo pipefail

          echo "=== TERRAFORM OUTPUT DEBUG ==="
          terraform output || true

          VM_IP=$(terraform output -raw vm_ip)
          REGISTRY_SERVER=$(terraform output -raw registry_server)
          REPOSITORY_NAME=$(terraform output -raw repository_name)
          REGISTRY_USERNAME=$(terraform output -raw registry_username)
          REGISTRY_PASSWORD=$(terraform output -raw registry_password)

          echo "vm_ip=$VM_IP" >> "$GITHUB_OUTPUT"
          echo "registry_server=$REGISTRY_SERVER" >> "$GITHUB_OUTPUT"
          echo "repository_name=$REPOSITORY_NAME" >> "$GITHUB_OUTPUT"
          echo "registry_username=$REGISTRY_USERNAME" >> "$GITHUB_OUTPUT"
          echo "registry_password=$REGISTRY_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "ssh_user=ec2-user" >> "$GITHUB_OUTPUT"