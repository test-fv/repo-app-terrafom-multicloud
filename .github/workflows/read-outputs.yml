```yaml
name: Reusable Terraform Outputs

on:
  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

    outputs:

      vm_ip:
        value: ${{ jobs.outputs.outputs.vm_ip }}

      registry_url:
        value: ${{ jobs.outputs.outputs.registry_url }}

      registry_username:
        value: ${{ jobs.outputs.outputs.registry_username }}

      registry_password:
        value: ${{ jobs.outputs.outputs.registry_password }}

      ssh_user:
        value: ${{ jobs.outputs.outputs.ssh_user }}

jobs:

  outputs:

    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.outputs.outputs.vm_ip }}
      registry_url: ${{ steps.outputs.outputs.registry_url }}
      registry_username: ${{ steps.outputs.outputs.registry_username }}
      registry_password: ${{ steps.outputs.outputs.registry_password }}
      ssh_user: ${{ steps.outputs.outputs.ssh_user }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs
        id: outputs
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "vm_ip=$(terraform output -raw vm_ip)" >> $GITHUB_OUTPUT
          echo "registry_url=$(terraform output -raw registry_url)" >> $GITHUB_OUTPUT
          echo "registry_username=$(terraform output -raw registry_username)" >> $GITHUB_OUTPUT
          echo "registry_password=$(terraform output -raw registry_password)" >> $GITHUB_OUTPUT
          echo "ssh_user=$(terraform output -raw ssh_user)" >> $GITHUB_OUTPUT

      - name: Debug Outputs
        run: |
          echo "======================================="
          echo "Terraform Outputs"
          echo "======================================="
          echo "VM_IP=${{ steps.outputs.outputs.vm_ip }}"
          echo "REGISTRY_URL=${{ steps.outputs.outputs.registry_url }}"
          echo "REGISTRY_USERNAME=${{ steps.outputs.outputs.registry_username }}"
          echo "SSH_USER=${{ steps.outputs.outputs.ssh_user }}"
          echo "======================================="
```
