name: Read Terraform Outputs

on:

  workflow_call:

    inputs:

      working-directory:
        required: true
        type: string

      cloud-provider:
        required: true
        type: string

    outputs:

      public_ip:
        value: ${{ jobs.terraform_outputs.outputs.public_ip }}

      instance_id:
        value: ${{ jobs.terraform_outputs.outputs.instance_id }}

      registry_url:
        value: ${{ jobs.terraform_outputs.outputs.registry_url }}

      registry_server:
        value: ${{ jobs.terraform_outputs.outputs.registry_server }}

      repository_name:
        value: ${{ jobs.terraform_outputs.outputs.repository_name }}

      runtime_bucket_name:
        value: ${{ jobs.terraform_outputs.outputs.runtime_bucket_name }}

      runtime_bucket_arn:
        value: ${{ jobs.terraform_outputs.outputs.runtime_bucket_arn }}

jobs:

  terraform_outputs:

    runs-on: ubuntu-latest

    outputs:

      public_ip: ${{ steps.export.outputs.public_ip }}

      instance_id: ${{ steps.export.outputs.instance_id }}

      registry_url: ${{ steps.export.outputs.registry_url }}

      registry_server: ${{ steps.export.outputs.registry_server }}

      repository_name: ${{ steps.export.outputs.repository_name }}

      runtime_bucket_name: ${{ steps.export.outputs.runtime_bucket_name }}

      runtime_bucket_arn: ${{ steps.export.outputs.runtime_bucket_arn }}

    defaults:

      run:
        working-directory: ${{ inputs.working-directory }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      ##########################################################
      # AWS Login
      ##########################################################

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ##########################################################
      # Azure Login
      ##########################################################

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      ##########################################################
      # Terraform
      ##########################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      ##########################################################
      # Export Outputs
      ##########################################################

      - id: export
        shell: bash
        run: |

          json=$(terraform output -json)

          echo "public_ip=$(echo "$json" | jq -r '.public_ip.value')" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(echo "$json" | jq -r '.instance_id.value')" >> "$GITHUB_OUTPUT"
          echo "registry_url=$(echo "$json" | jq -r '.registry_url.value')" >> "$GITHUB_OUTPUT"
          echo "registry_server=$(echo "$json" | jq -r '.registry_server.value')" >> "$GITHUB_OUTPUT"
          echo "repository_name=$(echo "$json" | jq -r '.repository_name.value')" >> "$GITHUB_OUTPUT"
          echo "runtime_bucket_name=$(echo "$json" | jq -r '.runtime_bucket_name.value')" >> "$GITHUB_OUTPUT"
          echo "runtime_bucket_arn=$(echo "$json" | jq -r '.runtime_bucket_arn.value')" >> "$GITHUB_OUTPUT"