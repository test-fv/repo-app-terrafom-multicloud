name: Reusable Terraform Outputs

on:
  workflow_call:
    inputs:
      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

    outputs:
      vm_ip:
        value: ${{ jobs.terraform_outputs.outputs.vm_ip }}

      registry_server:
        value: ${{ jobs.terraform_outputs.outputs.registry_server }}

      repository_name:
        value: ${{ jobs.terraform_outputs.outputs.repository_name }}

      registry_username:
        value: ${{ jobs.terraform_outputs.outputs.registry_username }}

      registry_password:
        value: ${{ jobs.terraform_outputs.outputs.registry_password }}

      ssh_user:
        value: ${{ jobs.terraform_outputs.outputs.ssh_user }}

jobs:

  terraform_outputs:

    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.tf_outputs.outputs.vm_ip }}
      registry_server: ${{ steps.tf_outputs.outputs.registry_server }}
      repository_name: ${{ steps.tf_outputs.outputs.repository_name }}
      registry_username: ${{ steps.tf_outputs.outputs.registry_username }}
      registry_password: ${{ steps.tf_outputs.outputs.registry_password }}
      ssh_user: ${{ steps.tf_outputs.outputs.ssh_user }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs
        id: tf_outputs
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |

          echo "=== TERRAFORM RAW OUTPUTS ==="
          terraform output

          VM_IP=$(terraform output -raw vm_ip)

          # FIX: sanitización segura
          REGISTRY_SERVER=$(terraform output -raw registry_server | tr -d '\r' | tr -d '[]' | xargs)

          echo "RAW_SERVER=[$REGISTRY_SERVER]"

          REPOSITORY_NAME=$(terraform output -raw repository_name)
          REGISTRY_USERNAME=$(terraform output -raw registry_username)
          REGISTRY_PASSWORD=$(terraform output -raw registry_password)

          echo "vm_ip=$VM_IP" >> "$GITHUB_OUTPUT"
          echo "registry_server=$REGISTRY_SERVER" >> "$GITHUB_OUTPUT"
          echo "repository_name=$REPOSITORY_NAME" >> "$GITHUB_OUTPUT"
          echo "registry_username=$REGISTRY_USERNAME" >> "$GITHUB_OUTPUT"
          echo "registry_password=$REGISTRY_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "ssh_user=ec2-user" >> "$GITHUB_OUTPUT"

      - name: Debug Step Outputs
        run: |
          echo "======================================="
          echo "STEP OUTPUTS"
          echo "======================================="
          echo "VM_IP=${{ steps.tf_outputs.outputs.vm_ip }}"
          echo "REGISTRY_SERVER=${{ steps.tf_outputs.outputs.registry_server }}"
          echo "REPOSITORY_NAME=${{ steps.tf_outputs.outputs.repository_name }}"
          echo "REGISTRY_USERNAME=${{ steps.tf_outputs.outputs.registry_username }}"
          echo "SSH_USER=${{ steps.tf_outputs.outputs.ssh_user }}"
          echo "======================================="

      - name: Debug Raw Variables
        run: |
          echo "SERVER=[${{ steps.tf_outputs.outputs.registry_server }}]"
          echo "REPOSITORY=[${{ steps.tf_outputs.outputs.repository_name }}]"