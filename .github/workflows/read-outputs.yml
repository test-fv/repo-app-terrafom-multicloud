name: Reusable Terraform Outputs

on:
  workflow_call:

    inputs:

      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

jobs:

  outputs:

    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.outputs.outputs.vm_ip }}
      registry_url: ${{ steps.outputs.outputs.registry_url }}
      registry_username: ${{ steps.outputs.outputs.registry_username }}
      registry_password: ${{ steps.outputs.outputs.registry_password }}
      ssh_user: ${{ steps.outputs.outputs.ssh_user }}

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - id: outputs
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "vm_ip=$(terraform output -raw vm_ip)" >> $GITHUB_OUTPUT
          echo "registry_url=$(terraform output -raw registry_url)" >> $GITHUB_OUTPUT
          echo "registry_username=$(terraform output -raw registry_username)" >> $GITHUB_OUTPUT
          echo "registry_password=$(terraform output -raw registry_password)" >> $GITHUB_OUTPUT
          echo "ssh_user=$(terraform output -raw ssh_user)" >> $GITHUB_OUTPUT