name: Reusable Terraform Outputs

on:
  workflow_call:
    inputs:
      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

    outputs:
      vm_ip:
        value: ${{ jobs.terraform_outputs.outputs.vm_ip }}

      registry_server:
        value: ${{ jobs.terraform_outputs.outputs.registry_server }}

      repository_name:
        value: ${{ jobs.terraform_outputs.outputs.repository_name }}

      registry_username:
        value: ${{ jobs.terraform_outputs.outputs.registry_username }}

      registry_password:
        value: ${{ jobs.terraform_outputs.outputs.registry_password }}

      ssh_user:
        value: ${{ jobs.terraform_outputs.outputs.ssh_user }}

jobs:

  terraform_outputs:

    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.export.outputs.vm_ip }}
      registry_server: ${{ steps.export.outputs.registry_server }}
      repository_name: ${{ steps.export.outputs.repository_name }}
      registry_username: ${{ steps.export.outputs.registry_username }}
      registry_password: ${{ steps.export.outputs.registry_password }}
      ssh_user: ${{ steps.export.outputs.ssh_user }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs
        id: export
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |

          set -euo pipefail

          echo "=== TERRAFORM OUTPUTS ==="
          terraform output

          VM_IP=$(terraform output -raw vm_ip)
          REGISTRY_SERVER=$(terraform output -raw registry_server | tr -d '\r' | tr -d '[]' | xargs)
          REPOSITORY_NAME=$(terraform output -raw repository_name)
          REGISTRY_USERNAME=$(terraform output -raw registry_username)
          REGISTRY_PASSWORD=$(terraform output -raw registry_password)

          echo "RAW_SERVER=[$REGISTRY_SERVER]"

          # 🔥 Guardar en ENV (lo más estable en GitHub Actions)
          echo "VM_IP=$VM_IP" >> $GITHUB_ENV
          echo "REGISTRY_SERVER=$REGISTRY_SERVER" >> $GITHUB_ENV
          echo "REPOSITORY_NAME=$REPOSITORY_NAME" >> $GITHUB_ENV
          echo "REGISTRY_USERNAME=$REGISTRY_USERNAME" >> $GITHUB_ENV
          echo "REGISTRY_PASSWORD=$REGISTRY_PASSWORD" >> $GITHUB_ENV
          echo "SSH_USER=ec2-user" >> $GITHUB_ENV

      - name: Export Step Outputs (bridge to reusable workflow)
        id: export_outputs
        shell: bash
        run: |
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "registry_server=$REGISTRY_SERVER" >> $GITHUB_OUTPUT
          echo "repository_name=$REPOSITORY_NAME" >> $GITHUB_OUTPUT
          echo "registry_username=$REGISTRY_USERNAME" >> $GITHUB_OUTPUT
          echo "registry_password=$REGISTRY_PASSWORD" >> $GITHUB_OUTPUT
          echo "ssh_user=$SSH_USER" >> $GITHUB_OUTPUT

      - name: Debug Step Outputs
        run: |
          echo "VM_IP=${{ steps.export_outputs.outputs.vm_ip }}"
          echo "REGISTRY_SERVER=${{ steps.export_outputs.outputs.registry_server }}"
          echo "REPOSITORY_NAME=${{ steps.export_outputs.outputs.repository_name }}"
          echo "REGISTRY_USERNAME=${{ steps.export_outputs.outputs.registry_username }}"
          echo "SSH_USER=${{ steps.export_outputs.outputs.ssh_user }}"