name: Reusable Terraform Outputs

on:
  workflow_call:
    inputs:
      cloud-provider:
        required: true
        type: string
      working-directory:
        required: true
        type: string

    outputs:
      vm_ip:
        value: ${{ jobs.outputs.outputs.vm_ip }}
      registry_server:
        value: ${{ jobs.outputs.outputs.registry_server }}
      repository_name:
        value: ${{ jobs.outputs.outputs.repository_name }}
      registry_username:
        value: ${{ jobs.outputs.outputs.registry_username }}
      registry_password:
        value: ${{ jobs.outputs.outputs.registry_password }}
      ssh_user:
        value: ${{ jobs.outputs.outputs.ssh_user }}

jobs:
  outputs:
    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.step.outputs.vm_ip }}
      registry_server: ${{ steps.step.outputs.registry_server }}
      repository_name: ${{ steps.step.outputs.repository_name }}
      registry_username: ${{ steps.step.outputs.registry_username }}
      registry_password: ${{ steps.step.outputs.registry_password }}
      ssh_user: ${{ steps.step.outputs.ssh_user }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs
        id: step
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          set -euo pipefail

          echo "=== RAW TERRAFORM OUTPUT ==="
          terraform output

          VM_IP=$(terraform output -raw vm_ip 2>/dev/null || true)
          REGISTRY_SERVER=$(terraform output -raw registry_server 2>/dev/null || true)
          REPO=$(terraform output -raw repository_name 2>/dev/null || true)
          USER=$(terraform output -raw registry_username 2>/dev/null || true)
          PASS=$(terraform output -raw registry_password 2>/dev/null || true)

          echo "REGISTRY_SERVER=[$REGISTRY_SERVER]"

          if [ -z "$REGISTRY_SERVER" ]; then
            echo "❌ TERRAFORM NO ESTÁ DEVOLVIENDO registry_server"
            exit 1
          fi

          echo "vm_ip=$VM_IP" >> "$GITHUB_OUTPUT"
          echo "registry_server=$REGISTRY_SERVER" >> "$GITHUB_OUTPUT"
          echo "repository_name=$REPO" >> "$GITHUB_OUTPUT"
          echo "registry_username=$USER" >> "$GITHUB_OUTPUT"
          echo "registry_password=$PASS" >> "$GITHUB_OUTPUT"
          echo "ssh_user=ec2-user" >> "$GITHUB_OUTPUT"