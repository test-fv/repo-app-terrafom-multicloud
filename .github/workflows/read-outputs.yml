name: Reusable Terraform Outputs

on:
  workflow_call:

    inputs:
      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

    outputs:
      vm_ip:
        value: ${{ jobs.terraform_outputs.outputs.vm_ip }}

      instance_id:
        value: ${{ jobs.terraform_outputs.outputs.instance_id }}

      registry_server:
        value: ${{ jobs.terraform_outputs.outputs.registry_server }}

      repository_name:
        value: ${{ jobs.terraform_outputs.outputs.repository_name }}

      ssh_user:
        value: ${{ jobs.terraform_outputs.outputs.ssh_user }}

      ssh_private_key:
        value: ${{ jobs.terraform_outputs.outputs.ssh_private_key }}

jobs:

  terraform_outputs:

    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.tf_outputs.outputs.vm_ip }}
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
      registry_server: ${{ steps.tf_outputs.outputs.registry_server }}
      repository_name: ${{ steps.tf_outputs.outputs.repository_name }}
      ssh_user: ${{ steps.tf_outputs.outputs.ssh_user }}
      ssh_private_key: ${{ steps.tf_outputs.outputs.ssh_private_key }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs
        id: tf_outputs
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |

          echo "=== TERRAFORM RAW OUTPUTS ==="
          terraform output

          VM_IP=$(terraform output -raw vm_ip)
          INSTANCE_ID=$(terraform output -raw instance_id)
          REGISTRY_SERVER=$(terraform output -raw registry_server)
          REPOSITORY_NAME=$(terraform output -raw repository_name)
          SSH_USER=$(terraform output -raw ssh_user)
          SSH_PRIVATE_KEY=$(terraform output -raw ssh_private_key)

          echo "vm_ip=$VM_IP" >> "$GITHUB_OUTPUT"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "registry_server=$REGISTRY_SERVER" >> "$GITHUB_OUTPUT"
          echo "repository_name=$REPOSITORY_NAME" >> "$GITHUB_OUTPUT"
          echo "ssh_user=$SSH_USER" >> "$GITHUB_OUTPUT"

          echo "ssh_private_key<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SSH_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Export Terraform Outputs JSON
        working-directory: ${{ inputs.working-directory }}
        run: |
          terraform output -json > outputs.json

      - name: Upload Terraform Outputs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ inputs.cloud-provider }}
          path: ${{ inputs.working-directory }}/outputs.json
          if-no-files-found: error

      - name: Debug Fingerprint
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |

          terraform output -raw ssh_private_key > private.pem

          chmod 600 private.pem

          echo "=================================="
          echo "SSH PRIVATE KEY FINGERPRINT (MD5)"
          echo "=================================="

          ssh-keygen -E md5 -lf private.pem

          echo ""

          echo "=================================="
          echo "SSH PRIVATE KEY FINGERPRINT (SHA256)"
          echo "=================================="

          ssh-keygen -lf private.pem

      - name: Debug Step Outputs
        run: |
          echo "======================================="
          echo "STEP OUTPUTS"
          echo "======================================="
          echo "VM_IP=${{ steps.tf_outputs.outputs.vm_ip }}"
          echo "INSTANCE_ID=${{ steps.tf_outputs.outputs.instance_id }}"
          echo "REGISTRY_SERVER=${{ steps.tf_outputs.outputs.registry_server }}"
          echo "REPOSITORY_NAME=${{ steps.tf_outputs.outputs.repository_name }}"
          echo "SSH_USER=${{ steps.tf_outputs.outputs.ssh_user }}"
          echo "======================================="

      - name: Debug Raw Variables
        run: |
          echo "SERVER=[${{ steps.tf_outputs.outputs.registry_server }}]"
          echo "REPOSITORY=[${{ steps.tf_outputs.outputs.repository_name }}]"