name: Reusable Terraform Outputs

on:
  workflow_call:
    inputs:
      cloud-provider:
        required: true
        type: string

      working-directory:
        required: true
        type: string

    outputs:
      vm_ip:
        value: ${{ jobs.outputs.outputs.vm_ip }}

      registry_url:
        value: ${{ jobs.outputs.outputs.registry_url }}

      registry_username:
        value: ${{ jobs.outputs.outputs.registry_username }}

      registry_password:
        value: ${{ jobs.outputs.outputs.registry_password }}

      ssh_user:
        value: ${{ jobs.outputs.outputs.ssh_user }}

jobs:

  outputs:

    runs-on: ubuntu-latest

    outputs:
      vm_ip: ${{ steps.tf_outputs.outputs.vm_ip }}
      registry_url: ${{ steps.tf_outputs.outputs.registry_url }}
      registry_username: ${{ steps.tf_outputs.outputs.registry_username }}
      registry_password: ${{ steps.tf_outputs.outputs.registry_password }}
      ssh_user: ${{ steps.tf_outputs.outputs.ssh_user }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        if: inputs.cloud-provider == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AWS Credentials
        if: inputs.cloud-provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -reconfigure -input=false

      - name: Read Terraform Outputs
        id: tf_outputs
        working-directory: ${{ inputs.working-directory }}
        run: |

          echo "=== TERRAFORM RAW OUTPUTS ==="
          terraform output

          VM_IP=$(terraform output -raw vm_ip)
          REGISTRY_URL=$(terraform output -raw registry_url)
          REGISTRY_USERNAME=$(terraform output -raw registry_username)
          REGISTRY_PASSWORD=$(terraform output -raw registry_password)

          {
            echo "vm_ip<<EOF"
            echo "$VM_IP"
            echo "EOF"

            echo "registry_url<<EOF"
            echo "$REGISTRY_URL"
            echo "EOF"

            echo "registry_username<<EOF"
            echo "$REGISTRY_USERNAME"
            echo "EOF"

            echo "registry_password<<EOF"
            echo "$REGISTRY_PASSWORD"
            echo "EOF"

            echo "ssh_user<<EOF"
            echo "ec2-user"
            echo "EOF"

          } >> "$GITHUB_OUTPUT"

      - name: Debug Step Outputs
        run: |
          echo "======================================="
          echo "STEP OUTPUTS"
          echo "======================================="
          echo "VM_IP=${{ steps.tf_outputs.outputs.vm_ip }}"
          echo "REGISTRY_URL=${{ steps.tf_outputs.outputs.registry_url }}"
          echo "REGISTRY_USERNAME=${{ steps.tf_outputs.outputs.registry_username }}"
          echo "SSH_USER=${{ steps.tf_outputs.outputs.ssh_user }}"
          echo "======================================="