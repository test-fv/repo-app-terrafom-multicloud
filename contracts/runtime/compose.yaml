name: application

services:

  app:

    image: ${REGISTRY_SERVER}/${REPOSITORY_NAME}:${IMAGE_TAG}

    container_name: app

    restart: unless-stopped

    pull_policy: always

    ports:
      - "80:8080"

    environment:
      TZ: UTC

    healthcheck:

      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]

      interval: 10s

      timeout: 5s

      retries: 3

      start_period: 20s

    depends_on: []

    logging:

      driver: json-file

      options:

        max-size: "20m"

        max-file: "5"

networks:

  default:

    name: application-network